name: Telegram Stock Analyzer

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: telegram-stock-analyzer
  cancel-in-progress: false

jobs:
  poll-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      ALLOWED_CHAT_IDS: ${{ secrets.ALLOWED_CHAT_IDS }}
      DEFAULT_PERIOD: ${{ vars.DEFAULT_PERIOD }}
      BENCHMARK_TICKER: ${{ vars.BENCHMARK_TICKER }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Poll Telegram and answer
        run: python github_action_poll.py
